name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bridge:
    name: bridge — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r services/bridge/requirements.txt
      - run: ruff check services/bridge/app
      - run: pytest services/bridge/tests -q
        env:
          OPENAI_API_KEY: test-key

  api:
    name: api — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r services/api/requirements.txt
      - run: ruff check services/api/app
      - run: pytest services/api/tests -q
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: test-secret-please-change
          SERVICE_TOKEN: test-service-token
          TATA_WEBHOOK_SECRET: test-webhook-secret

  frontend:
    name: frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package.json }
      - run: cd frontend && npm install --no-audit --no-fund
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run build

  docker:
    name: docker — build all images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build bridge
        uses: docker/build-push-action@v6
        with: { context: services/bridge, push: false, tags: voicebot-bridge:ci }
      - name: build api
        uses: docker/build-push-action@v6
        with: { context: services/api, push: false, tags: voicebot-api:ci }
      - name: build worker
        uses: docker/build-push-action@v6
        with: { context: services/worker, push: false, tags: voicebot-worker:ci }
      - name: build mock_telephony
        uses: docker/build-push-action@v6
        with: { context: services/mock_telephony, push: false, tags: voicebot-mock:ci }
      - name: build frontend
        uses: docker/build-push-action@v6
        with: { context: frontend, push: false, tags: voicebot-frontend:ci }

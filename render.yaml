# =============================================================================
# VoiceBot Platform — Render Blueprint (FREE testing stack)
#
# One-click deploy: New + > Blueprint > pick this repo.
#
# This Blueprint is intentionally $0 for the testing phase:
#   - All web services use plan: free
#   - Free Postgres + free Key Value (Redis)
#   - No background worker (Render workers have no free tier)
#
# Trade-offs (acceptable for testing, not for live telephony):
#   - Free web services spin down after ~15 min idle → cold start ~30–60s
#   - Outbound campaigns won't dial (no worker). Dashboard / API / bridge still work.
#   - Free Postgres is deleted after 30 days — export before then.
#
# When you're ready for paid/production: change plan: free → starter on the
# services you need warm, and add the worker block back (see docs/deployment.md).
# =============================================================================

envVarGroups:
  - name: voicebot-shared
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Kolkata
      - key: SERVICE_TOKEN
        generateValue: true

databases:
  - name: voicebot-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: keyvalue
    name: voicebot-kv
    plan: free
    region: singapore
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # ---------------------------------------------------------------------------
  # API — REST, auth, webhooks, dashboard WS. Runs DB migrations on boot.
  # ---------------------------------------------------------------------------
  - type: web
    name: voicebot-api
    runtime: docker
    rootDir: services/api
    region: singapore
    plan: free
    healthCheckPath: /healthz
    envVars:
      - fromGroup: voicebot-shared
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: voicebot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voicebot-kv
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: TATA_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_PUBLIC_URL
        sync: false

  # ---------------------------------------------------------------------------
  # Bridge — OpenAI Realtime audio. Free tier will cold-start; fine for demos.
  # ---------------------------------------------------------------------------
  - type: web
    name: voicebot-bridge
    runtime: docker
    rootDir: services/bridge
    region: singapore
    plan: free
    dockerCommand: sh -c "uvicorn app.main:app --host 0.0.0.0 --port $PORT --ws-ping-interval 20 --ws-ping-timeout 20 --log-config app/log_config.json"
    envVars:
      - fromGroup: voicebot-shared
      - key: PORT
        value: "8080"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime-2025-08-28
      - key: TELEPHONY_ADAPTER
        value: tata
      - key: TATA_STREAMING_AUTH_TOKEN
        sync: false
      - key: API_INTERNAL_URL
        value: http://voicebot-api:8000
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voicebot-kv
          property: connectionString
      - key: ENABLE_LIVE_TRANSCRIPT_PUBSUB
        value: "true"

  # ---------------------------------------------------------------------------
  # Frontend — Vite SPA (nginx). Rebuild after setting VITE_API_URL.
  # ---------------------------------------------------------------------------
  - type: web
    name: voicebot-frontend
    runtime: docker
    rootDir: frontend
    region: singapore
    plan: free
    healthCheckPath: /
    envVars:
      - key: VITE_API_URL
        sync: false

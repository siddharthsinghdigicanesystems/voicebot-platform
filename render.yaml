# =============================================================================
# VoiceBot Platform — Render Blueprint (FREE testing stack, no frontend)
#
# One-click deploy: New + > Blueprint > pick this repo.
#
# $0 testing stack:
#   - voicebot-api + voicebot-bridge (plan: free)
#   - Free Postgres + free Key Value (Redis)
#   - No frontend (dashboard not needed for telephony/API testing)
#   - No background worker (Render workers have no free tier)
#
# Trade-offs:
#   - Free web services spin down after ~15 min idle → cold start ~30–60s
#   - Outbound campaigns won't dial (no worker)
#   - Free Postgres is deleted after 30 days
# =============================================================================

envVarGroups:
  - name: voicebot-shared
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Kolkata
      - key: SERVICE_TOKEN
        generateValue: true

databases:
  - name: voicebot-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: keyvalue
    name: voicebot-kv
    plan: free
    region: singapore
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # ---------------------------------------------------------------------------
  # API — REST, auth, webhooks. Runs DB migrations on boot.
  # ---------------------------------------------------------------------------
  - type: web
    name: voicebot-api
    runtime: docker
    rootDir: services/api
    region: singapore
    plan: free
    healthCheckPath: /healthz
    envVars:
      - fromGroup: voicebot-shared
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: voicebot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voicebot-kv
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: TATA_WEBHOOK_SECRET
        sync: false
      # No dashboard in this stack; CORS origin unused but required by the API.
      - key: FRONTEND_PUBLIC_URL
        value: https://localhost

  # ---------------------------------------------------------------------------
  # Bridge — OpenAI Realtime audio. Free tier will cold-start; fine for demos.
  # ---------------------------------------------------------------------------
  - type: web
    name: voicebot-bridge
    runtime: docker
    rootDir: services/bridge
    region: singapore
    plan: free
    # Dockerfile CMD already binds ${PORT:-8080}; do not set dockerCommand —
    # Render wraps it in sh -c and nested quoting breaks with exit 127.
    envVars:
      - fromGroup: voicebot-shared
      - key: PORT
        value: "8080"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime-2025-08-28
      - key: TELEPHONY_ADAPTER
        value: tata
      - key: TATA_STREAMING_AUTH_TOKEN
        sync: false
      # Free web services cannot RECEIVE private-network traffic, so the
      # compose-style http://voicebot-api:8000 DNS name fails with
      # "Name or service not known". Use the api's public https URL instead.
      - key: API_INTERNAL_URL
        sync: false # e.g. https://voicebot-api.onrender.com
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voicebot-kv
          property: connectionString
      - key: ENABLE_LIVE_TRANSCRIPT_PUBSUB
        value: "true"
